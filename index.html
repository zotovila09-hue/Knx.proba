                    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
                });

                document.getElementById('profileAvatarBtn')?.addEventListener('click', () => {
                    if (state.currentUser) showUserProfile(state.currentUser.id, 'profile');
                });

                document.getElementById('createChatBtn')?.addEventListener('click', () => showCreateModal());

                // Выход из аккаунта (нижняя кнопка)
                document.getElementById('logoutBtnBottom')?.addEventListener('click', () => {
                    if (state.currentCall) endCall();
                    if (confirm('Выйти из аккаунта?')) {
                        if (state.currentUser) {
                            state.currentUser.online = false;
                            state.currentUser.lastSeen = Date.now();
                        }
                        state.currentUser = null;
                        state.currentChat = null;
                        state.showChatList = true;
                        state.activeTab = 'chats';
                        saveState();
                        render();
                    }
                });

                // Поиск чатов
                document.getElementById('searchChats')?.addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    document.querySelectorAll('#chatListScroll .chat-item').forEach(item => {
                        const name = item.querySelector('.chat-item-name')?.textContent
                            .toLowerCase() || '';
                        item.style.display = name.includes(q) ? 'flex' : 'none';
                    });
                });

                // Заголовок чата
                document.getElementById('chatInfoHeader')?.addEventListener('click', showChatInfoModal);

                // Звонок
                document.getElementById('callBtn')?.addEventListener('click', () => startCall(false));

                // Меню чата
                document.getElementById('chatMenuBtn')?.addEventListener('click', showChatMenuModal);

                // Тема
                document.getElementById('themeToggleBtn')?.addEventListener('click', () => {
                    state.theme = state.theme === 'dark' ? 'white' : 'dark';
                    state.settings.appearance.theme = state.theme;
                    applyTheme();
                    saveState();
                    const btn = document.getElementById('themeToggleBtn');
                    if (btn) {
                        btn.innerHTML = `<i class="fas fa-${state.theme === 'dark' ? 'sun' : 'moon'}"></i>`;
                    }
                });

                // Отправка сообщения
                const sendMsg = () => {
                    const input = document.getElementById('messageInput');
                    if (!input) return;
                    const text = input.value.trim();
                    if (!text || !state.currentChat) return;
                    const chat = state.chats.find(c => c.id === state.currentChat);
                    if (!chat) return;
                    if (chat.type === 'channel' && chat.admin !== state.currentUser.id) return;

                    const msg = {
                        id: generateId(),
                        sender: state.currentUser.id,
                        text,
                        time: Date.now(),
                        type: 'text',
                        deleted: false,
                        replyTo: state.replyTo || null
                    };

                    if (!state.messages[chat.id]) state.messages[chat.id] = [];
                    state.messages[chat.id].push(msg);

                    if (chat.type === 'private') {
                        const otherId = chat.participants.find(p => p !== state.currentUser.id);
                        if (otherId) updateStreak(state.currentUser.id, otherId);
                    }

                    chat.participants.forEach(p => {
                        if (p !== state.currentUser.id && chat.type !== 'channel') {
                            chat.unread[p] = (chat.unread[p] || 0) + 1;
                        }
                    });

                    state.replyTo = null;
                    saveState();
                    renderMessages();
                    renderChatList();
                    input.value = '';
                    input.focus();

                    if (chat.type === 'private') {
                        const otherId = chat.participants.find(p => p !== state.currentUser.id);
                        if (otherId) {
                            const statusEl = document.getElementById('chatStatus');
                            if (statusEl) {
                                statusEl.innerHTML =
                                    '<span style="color:var(--purple);">печатает</span><span class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>';
                            }
                            setTimeout(() => {
                                const reply = getAutoReply(text, otherId);
                                if (reply && state.currentChat === chat.id) {
                                    const replyMsg = {
                                        id: generateId(),
                                        sender: otherId,
                                        text: reply,
                                        time: Date.now(),
                                        type: 'text',
                                        deleted: false
                                    };
                                    if (!state.messages[chat.id]) state.messages[chat.id] = [];
                                    state.messages[chat.id].push(replyMsg);
                                    updateStreak(state.currentUser.id, otherId);
                                    chat.unread[state.currentUser.id] = (chat.unread[state
                                        .currentUser.id] || 0) + 1;
                                    saveState();
                                    if (state.currentChat === chat.id) renderMessages();
                                    renderChatList();
                                }
                                if (state.currentChat === chat.id && statusEl) {
                                    const display = getChatDisplay(chat, state.currentUser.id);
                                    statusEl.textContent = display.status;
                                }
                            }, 1500 + Math.random() * 2000);
                        }
                    }
                };

                document.getElementById('sendMsgBtn')?.addEventListener('click', sendMsg);
                document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMsg();
                    }
                });

                // Эмодзи панель
                const emojis = ['😀', '😂', '🤣', '😊', '😍', '🥰', '😘', '😋', '🤪', '😎', '🤓', '😢', '😭', '😤',
                    '😡', '👍', '👎', '👏', '🙌', '💪', '❤️', '🔥', '⭐', '✅', '❌', '🎉', '🎊', '🌈', '🍕', '☕', '🚀',
                    '💯'
                ];
                const emojiPanel = document.createElement('div');
                emojiPanel.id = 'emojiPanel';
                emojiPanel.style.cssText =
                    'display:none;position:fixed;bottom:55px;left:50%;transform:translateX(-50%);width:300px;max-width:90vw;background:var(--bg);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.25);z-index:5000;padding:8px;';
                emojiPanel.innerHTML =
                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;padding:0 4px;"><span style="font-weight:600;font-size:12px;color:var(--text2);">Эмодзи</span><button id="closeEmojiPanel" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--text2);padding:4px;">✕</button></div><div style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:200px;overflow-y:auto;">' +
                    emojis.map(e =>
                        `<button style="font-size:22px;background:none;border:none;padding:5px;cursor:pointer;border-radius:8px;transition:0.15s;" class="emoji-item">${e}</button>`
                        ).join('') + '</div>';
                document.body.appendChild(emojiPanel);

                document.getElementById('emojiBtn')?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const panel = document.getElementById('emojiPanel');
                    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
                });

                document.getElementById('closeEmojiPanel')?.addEventListener('click', () => {
                    document.getElementById('emojiPanel').style.display = 'none';
                });

                document.addEventListener('click', (e) => {
                    const panel = document.getElementById('emojiPanel');
                    if (panel && panel.style.display === 'block' && !panel.contains(e.target) && e.target
                        .id !== 'emojiBtn') {
                        panel.style.display = 'none';
                    }
                });

                emojiPanel.querySelectorAll('.emoji-item').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const input = document.getElementById('messageInput');
                        if (input) {
                            input.value += btn.textContent;
                            input.focus();
                        }
                        document.getElementById('emojiPanel').style.display = 'none';
                    });
                });

                // Прикрепление файла
                document.getElementById('attachBtn')?.addEventListener('click', () => {
                    document.getElementById('fileInput')?.click();
                });

                document.getElementById('fileInput')?.addEventListener('change', handleFileUpload);
                document.getElementById('avatarInput')?.addEventListener('change', handleAvatarUpload);
                document.getElementById('coverInput')?.addEventListener('change', handleCoverUpload);
            }

            // ==================== АВТООТВЕТЫ ====================
            function getAutoReply(msg, senderId) {
                const lower = msg.toLowerCase();
                if (senderId === 'kchat_bot') {
                    if (lower.includes('привет') || lower.includes('здрав')) return 'Привет! 👋 Чем могу помочь?';
                    if (lower.includes('помощь') || lower.includes('help')) return
                        'Я бот-помощник KChat! Могу ответить на вопросы о приложении.';
                    const replies = ['👍', 'Понял!', 'Ок!', 'Хорошо!', '✅'];
                    return replies[Math.floor(Math.random() * replies.length)];
                }
                if (senderId === 'maria_design') {
                    if (lower.includes('привет')) return 'Привет! Как дела?';
                    if (lower.includes('дизайн')) return 'Да, работаю над новым дизайном! 🎨';
                    return ['Отлично!', 'Супер!', '👌'][Math.floor(Math.random() * 3)];
                }
                if (Math.random() > 0.6) return '👍';
                return null;
            }

            // ==================== ЗАГРУЗКА ФАЙЛОВ ====================
            function handleFileUpload(e) {
                const file = e.target.files[0];
                if (!file || !state.currentChat) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    let type = 'file',
                        text = '📎 Файл';
                    if (file.type.startsWith('image/')) { type = 'image';
                        text = '📷 Фото'; } else if (file.type.startsWith('video/')) { type = 'video';
                        text = '🎬 Видео'; } else if (file.type.startsWith('audio/')) { type = 'audio';
                        text = '🎵 Аудио'; }

                    const msg = {
                        id: generateId(),
                        sender: state.currentUser.id,
                        text,
                        time: Date.now(),
                        type,
                        mediaUrl: ev.target.result,
                        fileName: file.name,
                        deleted: false
                    };

                    if (!state.messages[state.currentChat]) state.messages[state.currentChat] = [];
                    state.messages[state.currentChat].push(msg);

                    const chat = state.chats.find(c => c.id === state.currentChat);
                    if (chat && chat.type === 'private') {
                        const otherId = chat.participants.find(p => p !== state.currentUser.id);
                        if (otherId) updateStreak(state.currentUser.id, otherId);
                    }
                    saveState();
                    renderMessages();
                    renderChatList();
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            }

            function handleAvatarUpload(e) {
                const file = e.target.files[0];
                if (!file || !state.currentUser) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.currentUser.customAvatar = ev.target.result;
                    if (state.users[state.currentUser.id]) state.users[state.currentUser.id].customAvatar = ev.target
                        .result;
                    saveState();
                    render();
                    closeAllModals();
                    showToast('Аватар обновлён!', 'success');
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            }

            function handleCoverUpload(e) {
                const file = e.target.files[0];
                if (!file || !state.currentUser) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.currentUser.coverImage = ev.target.result;
                    if (state.users[state.currentUser.id]) state.users[state.currentUser.id].coverImage = ev.target
                        .result;
                    saveState();
                    closeAllModals();
                    showToast('Обложка обновлена!', 'success');
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            }

            // ==================== ЗВОНКИ ====================
            async function startCall(isVideo) {
                if (!state.currentChat) return showToast('Выберите чат', 'warning');
                const chat = state.chats.find(c => c.id === state.currentChat);
                if (!chat || chat.type !== 'private') return showToast('Звонки только в личных чатах', 'warning');

                const otherId = chat.participants.find(p => p !== state.currentUser.id);
                const otherUser = state.users[otherId];

                try {
                    state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
                    state.currentCall = {
                        chatId: state.currentChat,
                        isVideo,
                        otherId,
                        startTime: Date.now(),
                        muted: false
                    };
                    state.callDuration = 0;
                    showCallScreen(otherUser?.name || 'Контакт', isVideo);
                    state.callTimer = setInterval(updateCallTimer, 1000);
                } catch (e) {
                    console.warn('Microphone access denied:', e);
                    showToast('Нет доступа к микрофону', 'error');
                }
            }

            function showCallScreen(name, isVideo) {
                const screen = document.createElement('div');
                screen.className = 'call-screen';
                screen.id = 'callScreen';
                const otherUser = state.users[state.currentCall?.otherId];

                screen.innerHTML = `
                <div class="call-header">
                    <div class="avatar avatar-xl" style="margin:0 auto;">
                        ${otherUser?.customAvatar ? `<img src="${otherUser.customAvatar}" class="avatar-img">` : (otherUser?.avatar || '👤')}
                    </div>
                    <h2 style="margin-top:12px;color:white;">${escapeHTML(name)}</h2>
                    <p id="callTimer" style="font-size:1.1rem;color:rgba(255,255,255,0.7);">00:00</p>
                </div>
                <div class="call-video-area">
                    ${otherUser?.customAvatar ? 
                        `<img src="${otherUser.customAvatar}" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.2);">` : 
                        (otherUser?.avatar || '👤')}
                </div>
                <div class="call-controls">
                    <button class="call-btn mic" id="toggleMicBtn">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="call-btn end" id="endCallBtn">
                        <i class="fas fa-phone-slash"></i>
                    </button>
                </div>`;

                document.body.appendChild(screen);

                document.getElementById('endCallBtn').addEventListener('click', endCall);
                document.getElementById('toggleMicBtn').addEventListener('click', function() {
                    if (!state.localStream || !state.currentCall) return;
                    state.currentCall.muted = !state.currentCall.muted;
                    state.localStream.getAudioTracks().forEach(t => t.enabled = !state.currentCall.muted);
                    this.classList.toggle('muted', state.currentCall.muted);
                    this.querySelector('i').className = state.currentCall.muted ?
                        'fas fa-microphone-slash' : 'fas fa-microphone';
                });
            }

            function updateCallTimer() {
                if (!state.currentCall) return;
                state.callDuration = Math.floor((Date.now() - state.currentCall.startTime) / 1000);
                const timer = document.getElementById('callTimer');
                if (timer) {
                    const m = Math.floor(state.callDuration / 60),
                        s = state.callDuration % 60;
                    timer.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }
            }

            function endCall() {
                if (state.localStream) {
                    state.localStream.getTracks().forEach(t => t.stop());
                    state.localStream = null;
                }
                if (state.callTimer) {
                    clearInterval(state.callTimer);
                    state.callTimer = null;
                }
                const screen = document.getElementById('callScreen');
                if (screen) {
                    screen.style.animation = 'fadeOut 0.3s ease forwards';
                    setTimeout(() => screen.remove(), 300);
                }
                if (state.currentChat && state.currentCall) {
                    const chat = state.chats.find(c => c.id === state.currentChat);
                    if (chat) {
                        const m = Math.floor((state.callDuration || 0) / 60),
                            s = ((state.callDuration || 0) % 60).toString().padStart(2, '0');
                        const msg = {
                            id: generateId(),
                            sender: state.currentUser.id,
                            text: `📞 Звонок (${m}:${s})`,
                            time: Date.now(),
                            type: 'text',
                            deleted: false
                        };
                        if (!state.messages[chat.id]) state.messages[chat.id] = [];
                        state.messages[chat.id].push(msg);
                        if (chat.type === 'private') {
                            const otherId = chat.participants.find(p => p !== state.currentUser.id);
                            if (otherId) updateStreak(state.currentUser.id, otherId);
                        }
                        saveState();
                        renderMessages();
                        renderChatList();
                    }
                }
                state.currentCall = null;
            }

            // ==================== ЧАТЫ ====================
            function renderChatList() {
                const container = document.getElementById('chatListScroll');
                if (!container || !state.currentUser) return;

                const userId = state.currentUser.id;
                let chats = state.chats.filter(c => c.participants.includes(userId));

                chats.sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    const msgsA = (state.messages[a.id] || []).filter(m => !m.deleted);
                    const msgsB = (state.messages[b.id] || []).filter(m => !m.deleted);
                    const lastA = msgsA[msgsA.length - 1];
                    const lastB = msgsB[msgsB.length - 1];
                    return (lastB?.time || 0) - (lastA?.time || 0);
                });

                container.innerHTML = chats.map((chat, index) => {
                    const unread = chat.unread[userId] || 0;
                    const display = getChatDisplay(chat, userId);
                    const msgs = (state.messages[chat.id] || []).filter(m => !m.deleted);
                    const last = msgs[msgs.length - 1];
                    const preview = last ?
                        (last.sender === userId ? 'Вы: ' : '') + last.text.substring(0, 25) :
                        'Нет сообщений';
                    const time = last ? formatTime(last.time) : '';

                    return `
                    <div class="chat-item ${chat.pinned ? 'pinned' : ''}" 
                         data-chat="${chat.id}" 
                         style="animation-delay:${index * 0.02}s">
                        <div class="chat-item-avatar ${display.online ? 'online' : ''}">
                            ${display.customAvatar ? 
                                `<img src="${display.customAvatar}" class="avatar-img">` : 
                                display.avatar}
                        </div>
                        <div class="chat-item-info">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span class="chat-item-name">
                                    ${chat.pinned ? '📌 ' : ''}${escapeHTML(display.name)}${display.streakHTML}
                                </span>
                                <span style="font-size:0.65rem;color:var(--text2);flex-shrink:0;">${time}</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span class="chat-item-msg">${escapeHTML(preview.substring(0, 30))}</span>
                                ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                container.querySelectorAll('.chat-item').forEach(item => {
                    item.addEventListener('click', () => openChat(item.dataset.chat));
                });
            }

            function openChat(chatId, showChatScreen = true) {
                state.currentChat = chatId;
                const chat = state.chats.find(c => c.id === chatId);
                if (!chat) return;

                chat.unread[state.currentUser.id] = 0;
                saveState();
                renderMessages();
                updateChatHeader();

                if (showChatScreen) {
                    state.showChatList = false;
                    state.activeTab = 'chats';
                    const clScreen = document.getElementById('chatListScreen');
                    const cScreen = document.getElementById('chatScreen');
                    const bottomNav = document.getElementById('bottomNav');
                    if (clScreen) clScreen.classList.add('hidden');
                    if (cScreen) cScreen.style.display = 'flex';
                    if (bottomNav) bottomNav.style.display = 'none';
                }

                renderChatList();
                updateBottomNav();
            }

            function renderMessages() {
                const container = document.getElementById('messagesArea');
                if (!container || !state.currentChat) return;

                const msgs = (state.messages[state.currentChat] || []).filter(m => !m.deleted);

                if (msgs.length === 0) {
                    container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-slash"></i>
                        <h3>Нет сообщений</h3>
                        <p>Напишите первое сообщение!</p>
                    </div>`;
                    return;
                }

                container.innerHTML = msgs.map(msg => {
                    const isMe = msg.sender === state.currentUser.id;
                    const sender = state.users[msg.sender];
                    let content = escapeHTML(msg.text);

                    if (msg.type === 'image' && msg.mediaUrl) {
                        content =
                            `<img src="${msg.mediaUrl}" class="msg-image" loading="lazy" onclick="this.requestFullscreen?.()">${msg.text ? '<br>' + escapeHTML(msg.text) : ''}`;
                    } else if (msg.type === 'video' && msg.mediaUrl) {
                        content =
                            `<video src="${msg.mediaUrl}" controls style="max-width:200px;border-radius:10px;" preload="metadata"></video>${msg.text ? '<br>' + escapeHTML(msg.text) : ''}`;
                    }

                    const msgReactions = state.reactions[msg.id] || {};
                    let reactionHTML = '';
                    if (Object.keys(msgReactions).length > 0) {
                        const total = Object.values(msgReactions).reduce((a, b) => a + b, 0);
                        const top = Object.entries(msgReactions).sort((a, b) => b[1] - a[1])[0];
                        reactionHTML =
                            `<span class="msg-reaction" data-react-msg="${msg.id}">${top[0]} ${total}</span>`;
                    }

                    return `
                    <div class="msg ${isMe ? 'out' : 'in'}" id="msg-${msg.id}">
                        <div class="msg-bubble">
                            ${!isMe && sender ? `<div class="msg-sender">@${sender.username || 'user'}</div>` : ''}
                            ${content}
                            <div class="msg-time">
                                ${formatTime(msg.time)}${isMe ? ' ✓✓' : ''}
                            </div>
                        </div>
                        ${reactionHTML}
                        <div class="msg-actions">
                            <button class="msg-action-btn copy" data-copy="${escapeHTML(msg.text).replace(/"/g, '&quot;')}">
                                <i class="fas fa-copy"></i>
                            </button>
                            <button class="msg-action-btn react" data-react="${msg.id}">
                                <i class="fas fa-smile"></i>
                            </button>
                            ${isMe ? `
                            <button class="msg-action-btn delete" data-delete="${msg.id}">
                                <i class="fas fa-trash-alt"></i>
                            </button>` : ''}
                        </div>
                    </div>`;
                }).join('');

                container.querySelectorAll('[data-copy]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const text = btn.dataset.copy.replace(/&quot;/g, '"');
                        navigator.clipboard?.writeText(text).then(() => {
                            showToast('Скопировано!', 'success');
                        }).catch(() => {});
                    });
                });

                container.querySelectorAll('[data-react]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        addReaction(btn.dataset.react);
                    });
                });

                container.querySelectorAll('[data-delete]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (confirm('Удалить сообщение?')) deleteMessage(btn.dataset.delete);
                    });
                });

                container.querySelectorAll('[data-react-msg]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        addReaction(el.dataset.reactMsg);
                    });
                });

                setTimeout(() => {
                    container.scrollTop = container.scrollHeight;
                }, 50);
            }

            function addReaction(msgId) {
                if (!state.reactions[msgId]) state.reactions[msgId] = {};
                const r = state.reactions[msgId];
                const emojis = ['👍', '❤️', '🔥', '😮', '👏', '🎉'];
                const emoji = emojis[Math.floor(Math.random() * emojis.length)];
                r[emoji] = (r[emoji] || 0) + 1;
                saveState();
                renderMessages();
            }

            function deleteMessage(msgId) {
                if (!state.currentChat) return;
                const msg = (state.messages[state.currentChat] || []).find(m => m.id === msgId);
                if (msg) {
                    msg.deleted = true;
                    saveState();
                    renderMessages();
                    renderChatList();
                }
            }

            function updateChatHeader() {
                if (!state.currentChat) return;
                const chat = state.chats.find(c => c.id === state.currentChat);
                if (!chat) return;

                const display = getChatDisplay(chat, state.currentUser.id);

                const avatarEl = document.getElementById('chatAvatar');
                if (avatarEl) {
                    if (display.customAvatar) {
                        avatarEl.innerHTML =
                            `<img src="${display.customAvatar}" class="avatar-img" style="border-radius:50%;">`;
                    } else {
                        avatarEl.textContent = display.avatar;
                    }
                    avatarEl.classList.toggle('online', display.online);
                }

                document.getElementById('chatName').innerHTML = escapeHTML(display.name) + (display.streakHTML || '');
                document.getElementById('chatStatus').textContent = display.status;
            }

            // ==================== МОДАЛЬНЫЕ ОКНА ====================
            function showModal(title, content) {
                closeAllModals();
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h3>${title}</h3>
                        <button class="modal-close">✕</button>
                    </div>
                    ${content}
                </div>`;
                document.body.appendChild(overlay);

                const closeModal = () => {
                    overlay.classList.add('closing');
                    setTimeout(() => overlay.remove(), 200);
                };

                overlay.querySelector('.modal-close').addEventListener('click', closeModal);
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) closeModal();
                });

                return { overlay, closeModal };
            }

            function showChatMenuModal() {
                if (!state.currentChat) return;
                const chat = state.chats.find(c => c.id === state.currentChat);
                if (!chat) return;

                const content = `
                <button class="btn btn-outline btn-sm" style="margin-bottom:6px;width:100%;" id="pinChatMenuBtn">
                    <i class="fas fa-thumbtack"></i> ${chat.pinned ? 'Открепить' : 'Закрепить'}
                </button>
                <button class="btn btn-outline btn-sm" style="margin-bottom:6px;width:100%;" id="muteChatMenuBtn">
                    <i class="fas fa-${chat.mute ? 'bell' : 'bell-slash'}"></i> ${chat.mute ? 'Вкл. уведомления' : 'Откл. уведомления'}
                </button>
                <button class="btn btn-outline btn-sm" style="margin-bottom:6px;width:100%;" id="infoChatMenuBtn">
                    <i class="fas fa-info-circle"></i> Информация
                </button>
                <button class="btn btn-outline btn-sm" style="margin-bottom:6px;width:100%;" id="clearChatMenuBtn">
                    <i class="fas fa-broom"></i> Очистить историю
                </button>
                <button class="btn btn-danger btn-sm" style="width:100%;" id="deleteChatMenuBtn">
                    <i class="fas fa-trash-alt"></i> Удалить чат
                </button>`;

                const { overlay, closeModal } = showModal('⚙️ Меню чата', content);

                overlay.querySelector('#pinChatMenuBtn').addEventListener('click', () => {
                    chat.pinned = !chat.pinned;
                    saveState();
                    closeModal();
                    renderChatList();
                });

                overlay.querySelector('#muteChatMenuBtn').addEventListener('click', () => {
                    chat.mute = !chat.mute;
                    saveState();
                    closeModal();
                    showToast(chat.mute ? 'Уведомления отключены' : 'Уведомления включены', 'success');
                });

                overlay.querySelector('#infoChatMenuBtn').addEventListener('click', () => {
                    closeModal();
                    showChatInfoModal();
                });

                overlay.querySelector('#clearChatMenuBtn').addEventListener('click', () => {
                    closeModal();
                    if (confirm('Очистить историю сообщений?')) {
                        state.messages[chat.id] = [];
                        saveState();
                        renderMessages();
                        renderChatList();
                        showToast('История очищена', 'success');
                    }
                });

                overlay.querySelector('#deleteChatMenuBtn').addEventListener('click', () => {
                    closeModal();
                    if (confirm('Удалить чат безвозвратно?')) {
                        deleteChat(chat.id);
                    }
                });
            }

            function deleteChat(chatId) {
                const idx = state.chats.findIndex(c => c.id === chatId);
                if (idx !== -1) {
                    state.chats.splice(idx, 1);
                    if (state.messages[chatId]) delete state.messages[chatId];
                    if (state.currentChat === chatId) {
                        state.currentChat = null;
                        state.showChatList = true;
                        state.activeTab = 'chats';
                        const clScreen = document.getElementById('chatListScreen');
                        const cScreen = document.getElementById('chatScreen');
                        const bottomNav = document.getElementById('bottomNav');
                        if (clScreen) clScreen.classList.remove('hidden');
                        if (cScreen) cScreen.style.display = 'none';
                        if (bottomNav) bottomNav.style.display = 'flex';
                    }
                    saveState();
                    renderChatList();
                    updateBottomNav();
                    showToast('Чат удалён', 'success');
                }
            }

            function showChatInfoModal() {
                if (!state.currentChat) return;
                const chat = state.chats.find(c => c.id === state.currentChat);
                if (!chat) return;

                const msgs = (state.messages[chat.id] || []).filter(m => !m.deleted);
                const content = `
                <div style="text-align:center;margin-bottom:12px;">
                    <div class="avatar avatar-xl" style="margin:0 auto;">${chat.avatar || '💬'}</div>
                    <h3 style="margin-top:8px;">${chat.name || 'Чат'}</h3>
                    ${chat.description ? `<p style="color:var(--text2);font-size:0.85rem;">${escapeHTML(chat.description)}</p>` : ''}
                </div>
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value">${msgs.length}</div>
                        <div class="stat-label">Сообщений</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${chat.participants.length}</div>
                        <div class="stat-label">Участников</div>
                    </div>
                </div>
                <h4 style="margin-bottom:6px;">Участники:</h4>
                ${chat.participants.map(p => {
                    const u = state.users[p];
                    return `
                    <div class="setting-row" data-profile="${p}" style="cursor:pointer;">
                        <span>${u?.avatar || '👤'} ${u?.name || 'Участник'}</span>
                        <span style="color:var(--purple);font-size:0.8rem;">@${u?.username || 'нет'}</span>
                    </div>`;
                }).join('')}`;

                const { overlay } = showModal('ℹ️ Информация о чате', content);
                overlay.querySelectorAll('[data-profile]').forEach(el => {
                    el.addEventListener('click', () => showUserProfile(el.dataset.profile));
                });
            }

            function showUserProfile(profileId, openTab = 'profile') {
                const user = state.users[profileId];
                if (!user) return showToast('Пользователь не найден', 'error');

                const isOwn = state.currentUser?.id === profileId;
                const isBlocked = state.blacklist.includes(profileId);
                const totalMsgs = Object.values(state.messages).flat().filter(m => m.sender === profileId && !m
                    .deleted).length;
                const userChats = state.chats.filter(c => c.participants.includes(profileId));
                const commonChats = isOwn ? userChats : state.chats.filter(c => c.participants.includes(profileId) && c
                    .participants.includes(state.currentUser?.id));

                const profileHeaderHTML = `
                <div class="profile-cover" 
                     style="background:${user.coverImage ? `url(${user.coverImage}) center/cover` : `linear-gradient(135deg, ${user.coverColor || '#8b5cf6'}, #667eea)`};"
                     ${isOwn ? `onclick="document.getElementById('coverInput').click()"` : ''}>
                    ${isOwn ? '<div class="profile-cover-overlay" onclick="event.stopPropagation();document.getElementById(\'coverInput\').click()"><i class="fas fa-camera"></i></div>' : ''}
                </div>
                <div class="profile-avatar-container">
                    <div class="avatar avatar-xl ${user.online ? 'online' : ''}" 
                         ${isOwn ? `onclick="document.getElementById('avatarInput').click()"` : ''}>
                        ${user.customAvatar ? `<img src="${user.customAvatar}" class="avatar-img">` : user.avatar}
                    </div>
                    ${isOwn ? `<div class="profile-avatar-edit" onclick="document.getElementById('avatarInput').click()"><i class="fas fa-camera" style="font-size:0.6rem;"></i></div>` : ''}
                </div>
                <div style="text-align:center;">
                    <h2>${escapeHTML(user.name)}</h2>
                    <p style="color:var(--purple);font-size:0.85rem;">@${user.username || 'нет'} • ${user.id}</p>
                    ${user.bio ? `<p style="color:var(--text2);font-size:0.8rem;margin-top:2px;">${escapeHTML(user.bio)}</p>` : ''}
                </div>
                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value">${totalMsgs}</div>
                        <div class="stat-label">Сообщений</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${userChats.length}</div>
                        <div class="stat-label">Чатов</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${commonChats.length}</div>
                        <div class="stat-label">${isOwn ? 'Всего' : 'Общих'}</div>
                    </div>
                </div>`;

                const actionsHTML = !isOwn ? `
                <div class="action-row">
                    ${commonChats.length > 0 ? 
                        `<button class="btn btn-primary btn-sm" id="goToChatBtn"><i class="fas fa-comment"></i> Написать</button>` : 
                        `<button class="btn btn-primary btn-sm" id="createChatWithBtn"><i class="fas fa-plus"></i> Начать чат</button>`}
                    <button class="btn btn-outline btn-sm" id="callUserBtn"><i class="fas fa-phone-alt"></i> Звонок</button>
                    <button class="btn ${isBlocked ? 'btn-outline' : 'btn-danger'} btn-sm" id="toggleBlockBtn">
                        ${isBlocked ? 'Разблокировать' : 'Заблокировать'}
                    </button>
                </div>` : `
                <div class="action-row">
                    <button class="btn btn-primary btn-sm" id="editProfileBtn"><i class="fas fa-edit"></i> Редактировать</button>
                    <button class="btn btn-outline btn-sm" id="changeCoverBtn"><i class="fas fa-image"></i> Обложка</button>
                </div>`;

                let fullContent;
                if (isOwn) {
                    fullContent = `
                    <div class="tab-nav">
                        <button class="tab-btn ${openTab === 'profile' ? 'active' : ''}" data-tab="profile">👤 Профиль</button>
                        <button class="tab-btn ${openTab === 'settings' ? 'active' : ''}" data-tab="settings">⚙️ Настройки</button>
                    </div>
                    ${profileHeaderHTML}
                    ${actionsHTML}
                    <div id="tabProfile" style="display:${openTab === 'profile' ? 'block' : 'none'};"></div>
                    <div id="tabSettings" style="display:${openTab === 'settings' ? 'block' : 'none'};">
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-bell"></i> <span>Уведомления</span></span>
                            <label class="switch">
                                <input type="checkbox" ${state.settings.notifications ? 'checked' : ''} id="sNotif">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-volume-up"></i> <span>Звук</span></span>
                            <label class="switch">
                                <input type="checkbox" ${state.settings.sound ? 'checked' : ''} id="sSound">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-clock"></i> <span>Последний вход</span></span>
                            <label class="switch">
                                <input type="checkbox" ${state.settings.privacy.lastSeen ? 'checked' : ''} id="sLastSeen">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-phone-alt"></i> <span>Звонки</span></span>
                            <label class="switch">
                                <input type="checkbox" ${state.settings.privacy.allowCalls ? 'checked' : ''} id="sCalls">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-text-height"></i> <span>Размер шрифта</span></span>
                            <select id="sFontSize" style="padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:0.85rem;">
                                <option value="small" ${state.settings.appearance.fontSize === 'small' ? 'selected' : ''}>Маленький</option>
                                <option value="medium" ${state.settings.appearance.fontSize === 'medium' ? 'selected' : ''}>Средний</option>
                                <option value="large" ${state.settings.appearance.fontSize === 'large' ? 'selected' : ''}>Большой</option>
                            </select>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label"><i class="fas fa-palette"></i> <span>Тема</span></span>
                        </div>
                        <div class="theme-selector">
                            <button class="theme-btn ${state.theme === 'white' ? 'active' : ''}" data-theme="white">☀️ Светлая</button>
                            <button class="theme-btn ${state.theme === 'dark' ? 'active' : ''}" data-theme="dark">🌙 Тёмная</button>
                        </div>
                        <button class="btn btn-primary" style="margin-top:12px;" id="saveSettingsBtn">💾 Сохранить настройки</button>
                    </div>`;
                } else {
                    fullContent = profileHeaderHTML + actionsHTML;
                }

                const title = isOwn ? 'Мой профиль' : `👤 ${escapeHTML(user.name)}`;
                const { overlay, closeModal } = showModal(title, fullContent);

                if (isOwn) {
                    overlay.querySelectorAll('.tab-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            overlay.querySelectorAll('.tab-btn').forEach(b => b.classList.remove(
                                'active'));
                            btn.classList.add('active');
                            const tabName = btn.dataset.tab;
                            overlay.querySelector('#tabProfile').style.display = tabName ===
                                'profile' ? 'block' : 'none';
                            overlay.querySelector('#tabSettings').style.display = tabName ===
                                'settings' ? 'block' : 'none';
                        });
                    });

                    overlay.querySelectorAll('.theme-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            state.theme = btn.dataset.theme;
                            state.settings.appearance.theme = state.theme;
                            applyTheme();
                            saveState();
                            overlay.querySelectorAll('.theme-btn').forEach(b => b.classList
                                .remove('active'));
                            btn.classList.add('active');
                        });
                    });

                    overlay.querySelector('#saveSettingsBtn')?.addEventListener('click', () => {
                        state.settings.notifications = overlay.querySelector('#sNotif')
                            ?.checked ?? true;
                        state.settings.sound = overlay.querySelector('#sSound')?.checked ?? true;
                        state.settings.privacy.lastSeen = overlay.querySelector('#sLastSeen')
                            ?.checked ?? true;
                        state.settings.privacy.allowCalls = overlay.querySelector('#sCalls')
                            ?.checked ?? true;
                        state.settings.appearance.fontSize = overlay.querySelector('#sFontSize')
                            ?.value || 'medium';
                        saveState();
                        applyFontSize();
                        closeModal();
                        showToast('Настройки сохранены!', 'success');
                    });
                }

                if (!isOwn) {
                    overlay.querySelector('#goToChatBtn')?.addEventListener('click', () => {
                        closeModal();
                        if (commonChats.length > 0) openChat(commonChats[0].id);
                    });
                    overlay.querySelector('#createChatWithBtn')?.addEventListener('click', () => {
                        closeModal();
                        createChatWithUser(profileId);
                    });
                    overlay.querySelector('#callUserBtn')?.addEventListener('click', () => {
                        closeModal();
                        const chat = state.chats.find(c => c.type === 'private' && c.participants
                            .includes(state.currentUser.id) && c.participants.includes(profileId));
                        if (chat) {
                            openChat(chat.id);
                            setTimeout(() => startCall(false), 500);
                        } else {
                            createChatWithUser(profileId);
                            setTimeout(() => startCall(false), 700);
                        }
                    });
                    overlay.querySelector('#toggleBlockBtn')?.addEventListener('click', () => {
                        if (isBlocked) {
                            state.blacklist = state.blacklist.filter(p => p !== profileId);
                        } else {
                            state.blacklist.push(profileId);
                        }
                        saveState();
                        closeModal();
                        setTimeout(() => showUserProfile(profileId), 200);
                    });
                } else {
                    overlay.querySelector('#editProfileBtn')?.addEventListener('click', () => {
                        closeModal();
                        showEditProfileModal();
                    });
                    overlay.querySelector('#changeCoverBtn')?.addEventListener('click', () => {
                        document.getElementById('coverInput')?.click();
                        closeModal();
                    });
                }
            }

            function showEditProfileModal() {
                const u = state.currentUser;
                if (!u) return;

                const content = `
                <div class="input-group">
                    <label>Имя</label>
                    <input type="text" id="editName" value="${escapeHTML(u.name)}">
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="editUsername" value="${u.username || ''}">
                </div>
                <div class="input-group">
                    <label>Статус</label>
                    <input type="text" id="editStatus" value="${escapeHTML(u.status || '')}">
                </div>
                <div class="input-group">
                    <label>О себе</label>
                    <textarea id="editBio" rows="3">${escapeHTML(u.bio || '')}</textarea>
                </div>
                <button class="btn btn-primary" id="saveProfileBtn">Сохранить</button>`;

                const { overlay, closeModal } = showModal('✏️ Редактирование профиля', content);

                overlay.querySelector('#saveProfileBtn').addEventListener('click', () => {
                    u.name = overlay.querySelector('#editName').value.trim() || u.name;
                    u.username = overlay.querySelector('#editUsername').value.trim() || u.username;
                    u.status = overlay.querySelector('#editStatus').value.trim();
                    u.bio = overlay.querySelector('#editBio').value.trim();
                    saveState();
                    closeModal();
                    render();
                    showToast('Профиль обновлён!', 'success');
                });
            }

            function showCreateModal() {
                const contacts = Object.values(state.users).filter(u =>
                    u.id !== state.currentUser.id && !state.blacklist.includes(u.id)
                );

                const content = `
                <div class="input-group">
                    <input type="text" id="contactSearchInput" placeholder="🔍 Поиск контактов..." autocomplete="off">
                </div>
                <div style="max-height:250px;overflow-y:auto;" id="contactsList">
                    ${contacts.map(c => `
                        <div class="setting-row contact-item" data-id="${c.id}" style="cursor:pointer;">
                            <span>${c.avatar} ${c.name} <span style="color:var(--purple);font-size:0.8rem;">@${c.username || 'нет'}</span></span>
                            <span style="color:var(--text2);font-size:0.7rem;">${c.status || ''}</span>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-outline btn-sm" style="margin-top:8px;width:100%;" id="createGroupBtn">
                    <i class="fas fa-users"></i> Создать группу
                </button>`;

                const { overlay, closeModal } = showModal('💬 Новый чат', content);

                overlay.querySelector('#contactSearchInput')?.addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    overlay.querySelectorAll('.contact-item').forEach(item => {
                        item.style.display = item.textContent.toLowerCase().includes(q) ? 'flex' :
                            'none';
                    });
                });

                overlay.querySelectorAll('.contact-item').forEach(item => {
                    item.addEventListener('click', () => {
                        closeModal();
                        createChatWithUser(item.dataset.id);
                    });
                });

                overlay.querySelector('#createGroupBtn')?.addEventListener('click', () => {
                    closeModal();
                    showCreateGroupModal();
                });
            }

            function showCreateGroupModal() {
                const contacts = Object.values(state.users).filter(u =>
                    u.id !== state.currentUser.id && !state.blacklist.includes(u.id)
                );
                const selected = new Set();

                const content = `
                <div class="input-group">
                    <label>Название группы</label>
                    <input type="text" id="groupNameInput" placeholder="Название группы">
                </div>
                <div style="max-height:200px;overflow-y:auto;" id="groupContactsList">
                    ${contacts.map(c => `
                        <div class="setting-row group-contact-item" data-id="${c.id}" style="cursor:pointer;">
                            <span>${c.avatar} ${c.name}</span>
                            <i class="fas fa-circle" style="color:var(--border);font-size:0.4rem;transition:all 0.2s;"></i>
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-primary" id="confirmCreateGroupBtn" disabled>
                    Создать группу
                </button>`;

                const { overlay, closeModal } = showModal('👥 Новая группа', content);

                const updateCreateBtn = () => {
                    const btn = overlay.querySelector('#confirmCreateGroupBtn');
                    if (btn) btn.disabled = selected.size === 0;
                };

                overlay.querySelectorAll('.group-contact-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const id = item.dataset.id;
                        const icon = item.querySelector('i');
                        if (selected.has(id)) {
                            selected.delete(id);
                            item.style.background = '';
                            icon.style.color = 'var(--border)';
                        } else {
                            selected.add(id);
                            item.style.background = 'var(--bg2)';
                            icon.style.color = 'var(--purple)';
                        }
                        updateCreateBtn();
                    });
                });

                overlay.querySelector('#confirmCreateGroupBtn').addEventListener('click', () => {
                    if (selected.size === 0) return;
                    const name = overlay.querySelector('#groupNameInput').value.trim() || 'Новая группа';
                    const newChat = {
                        id: 'c_' + generateId(),
                        type: 'group',
                        name,
                        avatar: '👥',
                        description: '',
                        participants: [state.currentUser.id, ...Array.from(selected)],
                        admin: state.currentUser.id,
                        unread: {},
                        pinned: false,
                        mute: false
                    };
                    state.chats.push(newChat);
                    state.messages[newChat.id] = [{
                        id: generateId(),
                        sender: state.currentUser.id,
                        text: `🎉 Группа "${name}" создана!`,
                        time: Date.now(),
                        type: 'text',
                        deleted: false
                    }];
                    saveState();
                    closeModal();
                    renderChatList();
                    openChat(newChat.id);
                    showToast(`Группа "${name}" создана!`, 'success');
                });
            }

            function createChatWithUser(profileId) {
                const existing = state.chats.find(c =>
                    c.type === 'private' &&
                    c.participants.includes(state.currentUser.id) &&
                    c.participants.includes(profileId)
                );
                if (existing) {
                    openChat(existing.id);
                    return;
                }
                const newChat = {
                    id: 'c_' + generateId(),
                    type: 'private',
                    participants: [state.currentUser.id, profileId],
                    unread: {},
                    pinned: false,
                    mute: false
                };
                state.chats.push(newChat);
                state.messages[newChat.id] = [];
                saveState();
                renderChatList();
                openChat(newChat.id);
            }

            // ==================== ГЛОБАЛЬНЫЕ ОБРАБОТЧИКИ ====================
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeAllModals();
                    const panel = document.getElementById('emojiPanel');
                    if (panel) panel.style.display = 'none';
                }
            });

            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-overlay')) {
                    e.target.classList.add('closing');
                    setTimeout(() => e.target.remove(), 200);
                }
            });

            let touchStartX = 0;
            document.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
            }, { passive: true });

            document.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const diff = touchEndX - touchStartX;
                if (diff > 80 && !state.showChatList && state.currentChat) {
                    state.showChatList = true;
                    state.currentChat = null;
                    state.activeTab = 'chats';
                    const clScreen = document.getElementById('chatListScreen');
                    const cScreen = document.getElementById('chatScreen');
                    const bottomNav = document.getElementById('bottomNav');
                    if (clScreen) clScreen.classList.remove('hidden');
                    if (cScreen) cScreen.style.display = 'none';
                    if (bottomNav) bottomNav.style.display = 'flex';
                    renderChatList();
                    updateBottomNav();
                }
            });

            // ==================== ЗАПУСК ====================
            init();

            window.addEventListener('beforeunload', () => {
                if (state.currentCall) endCall();
                if (state.currentUser) {
                    state.currentUser.online = false;
                    state.currentUser.lastSeen = Date.now();
                    saveState();
                }
            });

            window.showUserProfile = showUserProfile;
            window.startCall = startCall;
            window.endCall = endCall;
            window.addReaction = addReaction;

            console.log('✅ KChat Pro Mobile v4 загружен!');
            console.log('📱 Исправлена кнопка выхода — теперь внизу списка чатов');
            console.log('👤 Профиль и Настройки разделены — нижняя панель навигации');
        })();
    </script>
</body>
</html>
