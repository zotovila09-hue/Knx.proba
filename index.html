                    <button class="bottom-nav-btn ${state.activeTab === 'chats' ? 'active' : ''}" data-tab="chats"><i class="fas fa-comments"></i><span>Чаты</span></button>
                    <button class="bottom-nav-btn ${state.activeTab === 'profile' ? 'active' : ''}" data-tab="profile"><i class="fas fa-user"></i><span>Профиль</span></button>
                    <button class="bottom-nav-btn ${state.activeTab === 'settings' ? 'active' : ''}" data-tab="settings"><i class="fas fa-cog"></i><span>Настройки</span></button>
                </div>`;

                return chatListHTML + chatScreenHTML + bottomNavHTML;
            }

            function updateBottomNav() {
                const nav = document.getElementById('bottomNav');
                if (!nav) return;
                nav.querySelectorAll('.bottom-nav-btn').forEach(function(btn) {
                    btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
                });
            }

            function switchTab(tab) {
                state.activeTab = tab;
                if (tab === 'chats') {
                    state.showChatList = true;
                    state.currentChat = null;
                    const cl = document.getElementById('chatListScreen');
                    const cs = document.getElementById('chatScreen');
                    const bn = document.getElementById('bottomNav');
                    if (cl) cl.classList.remove('hidden');
                    if (cs) cs.style.display = 'none';
                    if (bn) bn.style.display = 'flex';
                    renderChatList();
                } else if (tab === 'profile') {
                    state.showChatList = false;
                    const cl = document.getElementById('chatListScreen');
                    const cs = document.getElementById('chatScreen');
                    const bn = document.getElementById('bottomNav');
                    if (cl) cl.classList.add('hidden');
                    if (cs) cs.style.display = 'none';
                    if (bn) bn.style.display = 'flex';
                    if (state.currentUser) showUserProfile(state.currentUser.id, 'profile');
                } else if (tab === 'settings') {
                    state.showChatList = false;
                    const cl = document.getElementById('chatListScreen');
                    const cs = document.getElementById('chatScreen');
                    const bn = document.getElementById('bottomNav');
                    if (cl) cl.classList.add('hidden');
                    if (cs) cs.style.display = 'none';
                    if (bn) bn.style.display = 'flex';
                    if (state.currentUser) showUserProfile(state.currentUser.id, 'settings');
                }
                updateBottomNav();
            }

            function attachMainEvents() {
                document.getElementById('backToChatListBtn')?.addEventListener('click', function() {
                    state.showChatList = true;
                    state.currentChat = null;
                    state.activeTab = 'chats';
                    const cl = document.getElementById('chatListScreen');
                    const cs = document.getElementById('chatScreen');
                    const bn = document.getElementById('bottomNav');
                    if (cl) cl.classList.remove('hidden');
                    if (cs) cs.style.display = 'none';
                    if (bn) bn.style.display = 'flex';
                    renderChatList();
                    updateBottomNav();
                });

                document.querySelectorAll('.bottom-nav-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
                });

                document.getElementById('profileAvatarBtn')?.addEventListener('click', function() {
                    if (state.currentUser) showUserProfile(state.currentUser.id, 'profile');
                });

                document.getElementById('createChatBtn')?.addEventListener('click', function() { showCreateModal(); });

                document.getElementById('searchChats')?.addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    document.querySelectorAll('#chatListScroll .chat-item').forEach(function(item) {
                        const name = item.querySelector('.chat-item-name')?.textContent.toLowerCase() || '';
                        item.style.display = name.includes(q) ? 'flex' : 'none';
                    });
                });

                document.getElementById('chatInfoHeader')?.addEventListener('click', showChatInfoModal);
                document.getElementById('callBtn')?.addEventListener('click', function() { startCall(false); });
                document.getElementById('chatMenuBtn')?.addEventListener('click', showChatMenuModal);

                document.getElementById('themeToggleBtn')?.addEventListener('click', function() {
                    state.theme = state.theme === 'dark' ? 'white' : 'dark';
                    state.settings.appearance.theme = state.theme;
                    applyTheme();
                    saveState();
                    const btn = document.getElementById('themeToggleBtn');
                    if (btn) {
                        btn.innerHTML = '<i class="fas fa-' + (state.theme === 'dark' ? 'sun' : 'moon') + '"></i>';
                    }
                });

                const sendMsg = function() {
                    const input = document.getElementById('messageInput');
                    if (!input) return;
                    const text = input.value.trim();
                    if (!text || !state.currentChat) return;
                    const chat = state.chats.find(function(c) { return c.id === state.currentChat; });
                    if (!chat) return;
                    if (chat.type === 'channel' && chat.admin !== state.currentUser.id) return;

                    const msg = {
                        id: generateId(),
                        sender: state.currentUser.id,
                        text: text,
                        time: Date.now(),
                        type: 'text',
                        deleted: false,
                        replyTo: state.replyTo || null
                    };

                    if (!state.messages[chat.id]) state.messages[chat.id] = [];
                    state.messages[chat.id].push(msg);

                    if (chat.type === 'private') {
                        const otherId = chat.participants.find(function(p) { return p !== state.currentUser.id; });
                        if (otherId) updateStreak(state.currentUser.id, otherId);
                    }

                    chat.participants.forEach(function(p) {
                        if (p !== state.currentUser.id && chat.type !== 'channel') {
                            chat.unread[p] = (chat.unread[p] || 0) + 1;
                        }
                    });

                    state.replyTo = null;
                    saveState();
                    renderMessages();
                    renderChatList();
                    input.value = '';
                    input.focus();

                    if (chat.type === 'private') {
                        const otherId = chat.participants.find(function(p) { return p !== state.currentUser.id; });
                        if (otherId && (otherId === 'kchat_bot' || otherId === 'maria_design')) {
                            const statusEl = document.getElementById('chatStatus');
                            if (statusEl) {
                                statusEl.innerHTML = '<span style="color:var(--purple);">печатает</span><span class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>';
                            }
                            if (state.pendingAutoReply) {
                                clearTimeout(state.pendingAutoReply);
                                state.pendingAutoReply = null;
                            }
                            state.pendingAutoReply = setTimeout(function() {
                                state.pendingAutoReply = null;
                                const reply = getAutoReply(text, otherId);
                                if (reply && state.currentChat === chat.id) {
                                    const replyMsg = {
                                        id: generateId(),
                                        sender: otherId,
                                        text: reply,
                                        time: Date.now(),
                                        type: 'text',
                                        deleted: false
                                    };
                                    if (!state.messages[chat.id]) state.messages[chat.id] = [];
                                    state.messages[chat.id].push(replyMsg);
                                    updateStreak(state.currentUser.id, otherId);
                                    chat.unread[state.currentUser.id] = (chat.unread[state.currentUser.id] || 0) + 1;
                                    saveState();
                                    if (state.currentChat === chat.id) renderMessages();
                                    renderChatList();
                                }
                                if (state.currentChat === chat.id && statusEl) {
                                    const display = getChatDisplay(chat, state.currentUser.id);
                                    statusEl.textContent = display.status;
                                }
                            }, 1500 + Math.random() * 2000);
                        }
                    }
                };

                document.getElementById('sendMsgBtn')?.addEventListener('click', sendMsg);
                document.getElementById('messageInput')?.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMsg();
                    }
                });

                // Эмодзи панель
                const emojis = ['😀','😂','🤣','😊','😍','🥰','😘','😋','🤪','😎','🤓','😢','😭','😤','😡','👍','👎','👏','🙌','💪','❤️','🔥','⭐','✅','❌','🎉','🎊','🌈','🍕','☕','🚀','💯'];
                const emojiPanel = document.createElement('div');
                emojiPanel.id = 'emojiPanel';
                emojiPanel.style.cssText = 'display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:300px;max-width:90vw;background:var(--bg);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.25);z-index:5000;padding:8px;';
                emojiPanel.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;padding:0 4px;"><span style="font-weight:600;font-size:12px;color:var(--text2);">Эмодзи</span><button id="closeEmojiPanel" style="background:none;border:none;font-size:16px;cursor:pointer;color:var(--text2);padding:4px;">✕</button></div><div style="display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:200px;overflow-y:auto;">' + emojis.map(function(e) { return '<button style="font-size:22px;background:none;border:none;padding:5px;cursor:pointer;border-radius:8px;transition:0.15s;" class="emoji-item">' + e + '</button>'; }).join('') + '</div>';
                document.body.appendChild(emojiPanel);

                document.getElementById('emojiBtn')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const p = document.getElementById('emojiPanel');
                    p.style.display = p.style.display === 'block' ? 'none' : 'block';
                });

                document.getElementById('closeEmojiPanel')?.addEventListener('click', function() {
                    document.getElementById('emojiPanel').style.display = 'none';
                });

                document.addEventListener('click', function(e) {
                    const p = document.getElementById('emojiPanel');
                    if (p && p.style.display === 'block' && !p.contains(e.target) && e.target.id !== 'emojiBtn') {
                        p.style.display = 'none';
                    }
                });

                emojiPanel.querySelectorAll('.emoji-item').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        const inp = document.getElementById('messageInput');
                        if (inp) {
                            inp.value += btn.textContent;
                            inp.focus();
                        }
                        document.getElementById('emojiPanel').style.display = 'none';
                    });
                });

                document.getElementById('attachBtn')?.addEventListener('click', function() {
                    document.getElementById('fileInput')?.click();
                });

                document.getElementById('fileInput')?.addEventListener('change', handleFileUpload);
                document.getElementById('avatarInput')?.addEventListener('change', handleAvatarUpload);
                document.getElementById('coverInput')?.addEventListener('change', handleCoverUpload);
            }

            // ==================== АВТООТВЕТЫ ====================
            function getAutoReply(msg, senderId) {
                const lower = msg.toLowerCase();
                if (senderId === 'kchat_bot') {
                    if (lower.includes('привет') || lower.includes('здрав')) return 'Привет! 👋 Чем могу помочь?';
                    if (lower.includes('помощь') || lower.includes('help')) return 'Я бот-помощник KChat! Зажми сообщение для меню.';
                    const replies = ['👍', 'Понял!', 'Ок!', 'Хорошо!', '✅'];
                    return replies[Math.floor(Math.random() * replies.length)];
                }
                if (senderId === 'maria_design') {
                    if (lower.includes('привет')) return 'Привет! Как дела?';
                    if (lower.includes('дизайн')) return 'Да, работаю над новым дизайном! 🎨';
                    const replies = ['Отлично!', 'Супер!', '👌'];
                    return replies[Math.floor(Math.random() * replies.length)];
                }
                return null;
            }

            // ==================== ЗАГРУЗКА ФАЙЛОВ ====================
            function handleFileUpload(e) {
                const file = e.target.files[0];
                if (!file || !state.currentChat) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    let type = 'file';
                    let text = '📎 Файл';
                    if (file.type.startsWith('image/')) { type = 'image'; text = '📷 Фото'; }
                    else if (file.type.startsWith('video/')) { type = 'video'; text = '🎬 Видео'; }
                    else if (file.type.startsWith('audio/')) { type = 'audio'; text = '🎵 Аудио'; }

                    const msg = {
                        id: generateId(),
                        sender: state.currentUser.id,
                        text: text,
                        time: Date.now(),
                        type: type,
                        mediaUrl: ev.target.result,
                        fileName: file.name,
                        deleted: false
                    };

                    if (!state.messages[state.currentChat]) state.messages[state.currentChat] = [];
                    state.messages[state.currentChat].push(msg);

                    const chat = state.chats.find(function(c) { return c.id === state.currentChat; });
                    if (chat && chat.type === 'private') {
                        const otherId = chat.participants.find(function(p) { return p !== state.currentUser.id; });
                        if (otherId) updateStreak(state.currentUser.id, otherId);
                    }
                    saveState();
                    renderMessages();
                    renderChatList();
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            }

            function handleAvatarUpload(e) {
                const file = e.target.files[0];
                if (!file || !state.currentUser) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    state.currentUser.customAvatar = ev.target.result;
                    if (state.users[state.currentUser.id]) {
                        state.users[state.currentUser.id].customAvatar = ev.target.result;
                    }
                    saveState();
                    render();
                    closeAllModals();
                    showToast('Аватар обновлён!', 'success');
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            }

            function handleCoverUpload(e) {
                const file = e.target.files[0];
                if (!file || !state.currentUser) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    state.currentUser.coverImage = ev.target.result;
                    if (state.users[state.currentUser.id]) {
                        state.users[state.currentUser.id].coverImage = ev.target.result;
                    }
                    saveState();
                    closeAllModals();
                    showToast('Обложка обновлена!', 'success');
                    if (state.currentUser) {
                        setTimeout(function() { showUserProfile(state.currentUser.id, 'profile'); }, 300);
                    }
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            }

            // ==================== ЗВОНКИ ====================
            async function startCall(isVideo) {
                if (!state.currentChat) return showToast('Выберите чат', 'warning');
                const chat = state.chats.find(function(c) { return c.id === state.currentChat; });
                if (!chat || chat.type !== 'private') return showToast('Звонки только в личных чатах', 'warning');

                const otherId = chat.participants.find(function(p) { return p !== state.currentUser.id; });
                const otherUser = state.users[otherId];

                try {
                    state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo });
                    state.currentCall = {
                        chatId: state.currentChat,
                        isVideo: isVideo,
                        otherId: otherId,
                        startTime: Date.now(),
                        muted: false
                    };
                    state.callDuration = 0;
                    showCallScreen(otherUser?.name || 'Контакт');
                    state.callTimer = setInterval(updateCallTimer, 1000);
                } catch (e) {
                    console.warn('Microphone access denied:', e);
                    showToast('Нет доступа к микрофону', 'error');
                }
            }

            function showCallScreen(name) {
                const screen = document.createElement('div');
                screen.className = 'call-screen';
                screen.id = 'callScreen';
                const otherUser = state.users[state.currentCall?.otherId];

                screen.innerHTML = `
                <div class="call-header">
                    <div class="avatar avatar-xl" style="margin:0 auto;">
                        ${otherUser?.customAvatar ? '<img src="' + otherUser.customAvatar + '" class="avatar-img">' : (otherUser?.avatar || '👤')}
                    </div>
                    <h2 style="margin-top:12px;color:white;">${escapeHTML(name)}</h2>
                    <p id="callTimer" style="font-size:1.1rem;color:rgba(255,255,255,0.7);">00:00</p>
                </div>
                <div class="call-video-area">
                    ${otherUser?.customAvatar ? '<img src="' + otherUser.customAvatar + '" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.2);">' : (otherUser?.avatar || '👤')}
                </div>
                <div class="call-controls">
                    <button class="call-btn mic" id="toggleMicBtn"><i class="fas fa-microphone"></i></button>
                    <button class="call-btn end" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
                </div>`;

                document.body.appendChild(screen);

                document.getElementById('endCallBtn').addEventListener('click', endCall);
                document.getElementById('toggleMicBtn').addEventListener('click', function() {
                    if (!state.localStream || !state.currentCall) return;
                    state.currentCall.muted = !state.currentCall.muted;
                    state.localStream.getAudioTracks().forEach(function(t) { t.enabled = !state.currentCall.muted; });
                    this.classList.toggle('muted', state.currentCall.muted);
                    this.querySelector('i').className = state.currentCall.muted ? 'fas fa-microphone-slash' : 'fas fa-microphone';
                });
            }

            function updateCallTimer() {
                if (!state.currentCall) return;
                state.callDuration = Math.floor((Date.now() - state.currentCall.startTime) / 1000);
                const timer = document.getElementById('callTimer');
                if (timer) {
                    const m = Math.floor(state.callDuration / 60);
                    const s = (state.callDuration % 60).toString().padStart(2, '0');
                    timer.textContent = m.toString().padStart(2, '0') + ':' + s;
                }
            }

            function endCall() {
                if (state.localStream) {
                    state.localStream.getTracks().forEach(function(t) { t.stop(); });
                    state.localStream = null;
                }
                if (state.callTimer) {
                    clearInterval(state.callTimer);
                    state.callTimer = null;
                }
                const screen = document.getElementById('callScreen');
                if (screen) {
                    screen.style.animation = 'fadeOut 0.3s ease forwards';
                    setTimeout(function() { if (screen.parentNode) screen.remove(); }, 300);
                }
                if (state.currentChat && state.currentCall) {
                    const chat = state.chats.find(function(c) { return c.id === state.currentChat; });
                    if (chat) {
                        const m = Math.floor((state.callDuration || 0) / 60);
                        const s = ((state.callDuration || 0) % 60).toString().padStart(2, '0');
                        const msg = {
                            id: generateId(),
                            sender: state.currentUser.id,
                            text: '📞 Звонок (' + m + ':' + s + ')',
                            time: Date.now(),
                            type: 'text',
                            deleted: false
                        };
                        if (!state.messages[chat.id]) state.messages[chat.id] = [];
                        state.messages[chat.id].push(msg);
                        if (chat.type === 'private') {
                            const otherId = chat.participants.find(function(p) { return p !== state.currentUser.id; });
                            if (otherId) updateStreak(state.currentUser.id, otherId);
                        }
                        saveState();
                        renderMessages();
                        renderChatList();
                    }
                }
                state.currentCall = null;
            }

            // ==================== ЧАТЫ ====================
            function renderChatList() {
                const container = document.getElementById('chatListScroll');
                if (!container || !state.currentUser) return;

                const userId = state.currentUser.id;
                let chats = state.chats.filter(function(c) { return c.participants.includes(userId); });

                chats.sort(function(a, b) {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    const msgsA = (state.messages[a.id] || []).filter(function(m) { return !m.deleted; });
                    const msgsB = (state.messages[b.id] || []).filter(function(m) { return !m.deleted; });
                    const lastA = msgsA[msgsA.length - 1];
                    const lastB = msgsB[msgsB.length - 1];
                    return (lastB?.time || 0) - (lastA?.time || 0);
                });

                container.innerHTML = chats.map(function(chat, index) {
                    const unread = chat.unread[userId] || 0;
                    const display = getChatDisplay(chat, userId);
                    const msgs = (state.messages[chat.id] || []).filter(function(m) { return !m.deleted; });
                    const last = msgs[msgs.length - 1];
                    const preview = last ? (last.sender === userId ? 'Вы: ' : '') + last.text.substring(0, 25) : 'Нет сообщений';
                    const time = last ? formatTime(last.time) : '';

                    return `
                    <div class="chat-item ${chat.pinned ? 'pinned' : ''}" data-chat="${chat.id}" style="animation-delay:${index * 0.02}s">
                        <div class="chat-item-avatar ${display.online ? 'online' : ''}">
                            ${display.customAvatar ? '<img src="' + display.customAvatar + '" class="avatar-img">' : display.avatar}
                        </div>
                        <div class="chat-item-info">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span class="chat-item-name">${chat.pinned ? '📌 ' : ''}${escapeHTML(display.name)}${display.streakHTML}</span>
                                <span style="font-size:0.65rem;color:var(--text2);flex-shrink:0;">${time}</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <span class="chat-item-msg">${escapeHTML(preview.substring(0, 30))}</span>
                                ${unread > 0 ? '<span class="unread-badge">' + unread + '</span>' : ''}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                // Обработчики: тап — открыть, долгое нажатие — контекстное меню
                container.querySelectorAll('.chat-item').forEach(function(item) {
                    item.addEventListener('click', function(e) {
                        if (!state.longPressFired) {
                            openChat(item.dataset.chat);
                        }
                        state.longPressFired = false;
                    });
                    addLongPress(item, function() {
                        showChatContextMenu(item.dataset.chat);
                    });
                });
            }

            function openChat(chatId, showChatScreen) {
                if (showChatScreen === undefined) showChatScreen = true;
                state.currentChat = chatId;
                const chat = state.chats.find(function(c) { return c.id === chatId; });
                if (!chat) return;

                chat.unread[state.currentUser.id] = 0;
                saveState();
                renderMessages();
                updateChatHeader();

                if (showChatScreen) {
                    state.showChatList = false;
                    state.activeTab = 'chats';
                    const cl = document.getElementById('chatListScreen');
                    const cs = document.getElementById('chatScreen');
                    const bn = document.getElementById('bottomNav');
                    if (cl) cl.classList.add('hidden');
                    if (cs) cs.style.display = 'flex';
                    if (bn) bn.style.display = 'none';
                }

                renderChatList();
                updateBottomNav();
            }

            function renderMessages() {
                const container = document.getElementById('messagesArea');
                if (!container || !state.currentChat) return;

                const msgs = (state.messages[state.currentChat] || []).filter(function(m) { return !m.deleted; });

                if (msgs.length === 0) {
                    container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-slash"></i>
                        <h3>Нет сообщений</h3>
                        <p>Напишите первое сообщение!</p>
                    </div>`;
                    return;
                }

                container.innerHTML = msgs.map(function(msg, index) {
                    const isMe = msg.sender === state.currentUser.id;
                    const sender = state.users[msg.sender];
                    let content = escapeHTML(msg.text);

                    if (msg.type === 'image' && msg.mediaUrl) {
                        content = '<img src="' + msg.mediaUrl + '" class="msg-image" loading="lazy">' + (msg.text ? '<br>' + escapeHTML(msg.text) : '');
                    } else if (msg.type === 'video' && msg.mediaUrl) {
                        content = '<video src="' + msg.mediaUrl + '" controls style="max-width:200px;border-radius:10px;" preload="metadata"></video>' + (msg.text ? '<br>' + escapeHTML(msg.text) : '');
                    }

                    const msgReactions = state.reactions[msg.id] || {};
                    let reactionHTML = '';
                    if (Object.keys(msgReactions).length > 0) {
                        const total = Object.values(msgReactions).reduce(function(a, b) { return a + b; }, 0);
                        const top = Object.entries(msgReactions).sort(function(a, b) { return b[1] - a[1]; })[0];
                        reactionHTML = '<span class="msg-reaction">' + top[0] + ' ' + total + '</span>';
                    }

                    return `
                    <div class="msg ${isMe ? 'out' : 'in'}" id="msg-${msg.id}" data-msg="${msg.id}" style="animation-delay:${index * 0.01}s">
                        <div class="msg-bubble">
                            ${!isMe && sender ? '<div class="msg-sender">@' + (sender.username || 'user') + '</div>' : ''}
                            ${content}
                            <div class="msg-time">${formatTime(msg.time)}${isMe ? ' ✓✓' : ''}</div>
                        </div>
                        ${reactionHTML}
                    </div>`;
                }).join('');

                // Долгое нажатие на сообщения
                container.querySelectorAll('.msg').forEach(function(msgEl) {
                    addLongPress(msgEl, function() {
                        const msgId = msgEl.dataset.msg;
                        const msg = (state.messages[state.currentChat] || []).find(function(m) { return m.id === msgId; });
                        if (msg) showMessageContextMenu(msg, state.currentUser.id);
                    });
                });

                requestAnimationFrame(function() {
                    container.scrollTop = container.scrollHeight;
                });
            }

            function addReaction(msgId, emoji) {
                if (!state.reactions[msgId]) state.reactions[msgId] = {};
                state.reactions[msgId][emoji] = (state.reactions[msgId][emoji] || 0) + 1;
                saveState();
                renderMessages();
            }

            function deleteMessage(msgId) {
                if (!state.currentChat) return;
                const msg = (state.messages[state.currentChat] || []).find(function(m) { return m.id === msgId; });
                if (msg) {
                    msg.deleted = true;
                    saveState();
                    renderMessages();
                    renderChatList();
                }
            }

            function updateChatHeader() {
                if (!state.currentChat) return;
                const chat = state.chats.find(function(c) { return c.id === state.currentChat; });
                if (!chat) return;

                const display = getChatDisplay(chat, state.currentUser.id);

                const avatarEl = document.getElementById('chatAvatar');
                if (avatarEl) {
                    if (display.customAvatar) {
                        avatarEl.innerHTML = '<img src="' + display.customAvatar + '" class="avatar-img" style="border-radius:50%;">';

                    }

                const statusEl = document.getElementById('chatStatus');

            // ==================== КОНТЕКСТНОЕ МЕНЮ ====================
            function removeContextMenu() {
                const existing = document.querySelector('.context-menu-overlay');
                if (existing) {
                    existing.style.animation = 'fadeOut 0.15s ease forwards';
                    setTimeout(function() { if (existing.parentNode) existing.remove(); }, 150);
                }
            }

            function showMessageContextMenu(msg, userId) {
                removeContextMenu();
                const isMe = msg.sender === userId;
                const overlay = document.createElement('div');
                overlay.className = 'context-menu-overlay';

                let menuHTML = '';
                menuHTML += '<button class="context-menu-item" id="ctxCopy"><i class="fas fa-copy"></i> Копировать</button>';
                menuHTML += '<button class="context-menu-item" id="ctxReply"><i class="fas fa-reply"></i> Ответить</button>';
                menuHTML += '<div class="context-menu-divider"></div>';
                menuHTML += '<button class="context-menu-item" id="ctxReact"><i class="fas fa-smile"></i> Реакции</button>';
                if (isMe) {
                    menuHTML += '<div class="context-menu-divider"></div>';
                    menuHTML += '<button class="context-menu-item danger" id="ctxDelete"><i class="fas fa-trash-alt"></i> Удалить</button>';
                }
                menuHTML += '<div class="context-menu-divider"></div>';
                menuHTML += '<button class="context-menu-cancel" id="ctxCancel">Отмена</button>';

                overlay.innerHTML = '<div class="context-menu">' + menuHTML + '</div>';
                document.body.appendChild(overlay);

                const closeCtx = function() {
                    overlay.style.animation = 'fadeOut 0.15s ease forwards';
                    setTimeout(function() { if (overlay.parentNode) overlay.remove(); }, 150);
                };

                overlay.addEventListener('click', function(e) { if (e.target === overlay) closeCtx(); });
                overlay.querySelector('#ctxCancel').addEventListener('click', closeCtx);

                overlay.querySelector('#ctxCopy')?.addEventListener('click', function() {
                    navigator.clipboard?.writeText(msg.text).then(function() { showToast('Скопировано!', 'success'); }).catch(function() {});
                    closeCtx();
                });

                overlay.querySelector('#ctxReply')?.addEventListener('click', function() {
                    state.replyTo = msg.id;
                    closeCtx();
                    const inp = document.getElementById('messageInput');
                    if (inp) {
                        inp.placeholder = 'Ответ...';
                        inp.focus();
                    }
                });

                overlay.querySelector('#ctxReact')?.addEventListener('click', function() {
                    closeCtx();
                    showReactionPicker(msg.id);
                });

                overlay.querySelector('#ctxDelete')?.addEventListener('click', function() {
                    closeCtx();
                    if (confirm('Удалить сообщение?')) deleteMessage(msg.id);
                });
            }

                menuHTML += '<button class="context-menu-item" id="ctxInfo"><i class="fas fa-info-circle"></i> Информация</button>';
                menuHTML += '<div class="context-menu-divider"></div>';
                menuHTML += '<button class="context-menu-item" id="ctxClear"><i class="fas fa-broom"></i> Очистить историю</button>';
                menuHTML += '<button class="context-menu-item danger" id="ctxDeleteChat"><i class="fas fa-trash-alt"></i> Удалить чат</button>';
                menuHTML += '<div class="context-menu-divider"></div>';
                menuHTML += '<button class="context-menu-cancel" id="ctxCancel">Отмена</button>';

                overlay.innerHTML = '<div class="context-menu">' + menuHTML + '</div>';
                document.body.appendChild(overlay);

                const closeCtx = function() {
                    overlay.style.animation = 'fadeOut 0.15s ease forwards';
                    setTimeout(function() { if (overlay.parentNode) overlay.remove(); }, 150);
                };

                overlay.addEventListener('click', function(e) { if (e.target === overlay) closeCtx(); });
                overlay.querySelector('#ctxCancel').addEventListener('click', closeCtx);

                overlay.querySelector('#ctxPin')?.addEventListener('click', function() {
                    chat.pinned = !chat.pinned;
                    saveState();
                    closeCtx();
                    renderChatList();
                });

                overlay.querySelector('#ctxMute')?.addEventListener('click', function() {
                    chat.mute = !chat.mute;
                    saveState();
                    closeCtx();
                    showToast(chat.mute ? 'Уведомления отключены' : 'Уведомления включены', 'success');
                });

                overlay.querySelector('#ctxInfo')?.addEventListener('click', function() {
                    closeCtx();
                    openChat(chatId, false);
                    setTimeout(showChatInfoModal, 100);
                });

                overlay.querySelector('#ctxClear')?.addEventListener('click', function() {
                    closeCtx();
                    if (confirm('Очистить историю сообщений?')) {
                        state.messages[chat.id] = [];

                        renderMessages();
                        renderChatList();
                        showToast('История очищена', 'success');

                });

                overlay.querySelector('#ctxDeleteChat')?.addEventListener('click', function() {

                    if (confirm('Удалить чат безвозвратно?')) deleteChat(chatId);

            function showReactionPicker(msgId) {
                removeContextMenu();
                const overlay = document.createElement('div');
                overlay.className = 'context-menu-overlay';
                const reactionEmojis = ['👍', '❤️', '🔥', '😮', '👏', '🎉', '😂', '😢', '😡', '💯'];

                let pickerHTML = '<div class="context-menu"><div class="reaction-picker">';
                reactionEmojis.forEach(function(e) {
                    pickerHTML += '<button class="reaction-picker-btn">' + e + '</button>';
                });
                pickerHTML += '</div><button class="context-menu-cancel" id="ctxCancel">Отмена</button></div>';

                overlay.innerHTML = pickerHTML;
                document.body.appendChild(overlay);

                const closeCtx = function() {
                    overlay.style.animation = 'fadeOut 0.15s ease forwards';
                    setTimeout(function() { if (overlay.parentNode) overlay.remove(); }, 150);
                };

                overlay.addEventListener('click', function(e) { if (e.target === overlay) closeCtx(); });
                overlay.querySelector('#ctxCancel').addEventListener('click', closeCtx);
                overlay.querySelectorAll('.reaction-picker-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        addReaction(msgId, btn.textContent);
                        closeCtx();
                    });
                });
            }

            // ==================== LONG PRESS ====================
            function addLongPress(element, callback) {
                let timer = null;

                element.addEventListener('touchstart', function(e) {
                    state.longPressFired = false;
                    timer = setTimeout(function() {
                        state.longPressFired = true;
                        callback();
                    }, LONG_PRESS_DURATION);
                }, { passive: true });

                element.addEventListener('touchend', function() {
                    if (timer) clearTimeout(timer);
                });

                element.addEventListener('touchmove', function() {
                    if (timer) clearTimeout(timer);
                });

                element.addEventListener('touchcancel', function() {
                    if (timer) clearTimeout(timer);
                });

                // ПКМ для десктопа
                element.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    callback();
                });
            }

            // ==================== МОДАЛЬНЫЕ ОКНА ====================
            function showModal(title, content) {
                closeAllModals();
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                <div class="modal">
                    <div class="modal-header">
                        <h3>${title}</h3>
                        <button class="modal-close">✕</button>
                    </div>
                    ${content}
                </div>`;
                document.body.appendChild(overlay);

                const closeModal = function() {
                    overlay.classList.add('closing');
                    setTimeout(function() { if (overlay.parentNode) overlay.remove(); }, 200);
                };

                overlay.querySelector('.modal-close').addEventListener('click', closeModal);
                overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });

                return { overlay: overlay, closeModal: closeModal };
            }

            function showChatMenuModal() {
                if (!state.currentChat) return;
                const chat = state.chats.find(function(c) { return c.id === state.currentChat; });
                if (!chat) return;

                const content = `
                <button class="btn btn-outline btn-sm" style="margin-bottom:6px;width:100%;" id="pinChatMenuBtn"><i class="fas fa-thumbtack"></i> ${chat.pinned ? 'Открепить' : 'Закрепить'}</button>
                <button class="btn btn-outline btn-sm" style="margin-bottom:6px;width:100%;" id="muteChatMenuBtn"><i class="fas fa-${chat.mute ? 'bell' : 'bell-slash'}"></i> ${chat.mute ? 'Вкл. уведомления' : 'Откл. уведомления'}</button>
                <button class="btn btn-outline btn-sm" style="margin-bottom:6px;width:100%;" id="infoChatMenuBtn"><i class="fas fa-info-circle"></i> Информация</button>
                <button class="btn btn-outline btn-sm" style="margin-bottom:6px;width:100%;" id="clearChatMenuBtn"><i class="fas fa-broom"></i> Очистить историю</button>
                <button class="btn btn-danger btn-sm" style="width:100%;" id="deleteChatMenuBtn"><i class="fas fa-trash-alt"></i> Удалить чат</button>`;

                const result = showModal('⚙️ Меню чата', content);

                result.overlay.querySelector('#pinChatMenuBtn').addEventListener('click', function() {
                    chat.pinned = !chat.pinned;
                    saveState();
                    result.closeModal();
                    renderChatList();
                });

                result.overlay.querySelector('#muteChatMenuBtn').addEventListener('click', function() {
                    chat.mute = !chat.mute;
                    saveState();
                    result.closeModal();
                    showToast(chat.mute ? 'Уведомления отключены' : 'Уведомления включены', 'success');
                });

                result.overlay.querySelector('#infoChatMenuBtn').addEventListener('click', function() {
                    result.closeModal();
                    showChatInfoModal();
                });

                result.overlay.querySelector('#clearChatMenuBtn').addEventListener('click', function() {
                    result.closeModal();
                    if (confirm('Очистить историю сообщений?')) {
                        state.messages[chat.id] = [];
                        saveState();
                        renderMessages();
                        renderChatList();
                        showToast('История очищена', 'success');
                    }
                });

                result.overlay.querySelector('#deleteChatMenuBtn').addEventListener('click', function() {
                    result.closeModal();
                    if (confirm('Удалить чат безвозвратно?')) deleteChat(chat.id);
                });
            }

            function deleteChat(chatId) {
                const idx = state.chats.findIndex(function(c) { return c.id === chatId; });
                if (idx !== -1) {
                    state.chats.splice(idx, 1);
                    if (state.messages[chatId]) delete state.messages[chatId];
                    if (state.currentChat === chatId) {
                        state.currentChat = null;
                        state.showChatList = true;
                        state.activeTab = 'chats';
                    }
                    saveState();
                    render();
                    showToast('Чат удалён', 'success');
                }
            }

            function showChatInfoModal() {
                if (!state.currentChat) return;
                const chat = state.chats.find(function(c) { return c.id === state.currentChat; });
                if (!chat) return;

                const msgs = (state.messages[chat.id] || []).filter(function(m) { return !m.deleted; });
                const content = `
                <div style="text-align:center;margin-bottom:12px;">
                    <div class="avatar avatar-xl" style="margin:0 auto;">${chat.avatar || '💬'}</div>
                    <h3 style="margin-top:8px;">${chat.name || 'Чат'}</h3>

                </div>

                }).join('')}`;

                const result = showModal('ℹ️ Информация о чате', content);

            function showUserProfile(profileId, openTab) {
                if (openTab === undefined) openTab = 'profile';
                const user = state.users[profileId];
                if (!user) return showToast('Пользователь не найден', 'error');

                const userChats = state.chats.filter(function(c) { return c.participants.includes(profileId); });

                        createChatWithUser(profileId);
                    });

                    result.overlay.querySelector('#callUserBtn')?.addEventListener('click', function() {
                        result.closeModal();
                        const chat = state.chats.find(function(c) { return c.type === 'private' && c.participants.includes(state.currentUser.id) && c.participants.includes(profileId); });
                        if (chat) {
                            openChat(chat.id);
                            setTimeout(function() { startCall(false); }, 500);
                        } else {
                            createChatWithUser(profileId);
                            setTimeout(function() { startCall(false); }, 700);
                        }
                    });

                    result.overlay.querySelector('#toggleBlockBtn')?.addEventListener('click', function() {
                        if (isBlocked) {
                            state.blacklist = state.blacklist.filter(function(p) { return p !== profileId; });
                        } else {
                            state.blacklist.push(profileId);
                        }
                        saveState();
                        result.closeModal();
                        setTimeout(function() { showUserProfile(profileId); }, 200);
                    });
                } else {
                    result.overlay.querySelector('#editProfileBtn')?.addEventListener('click', function() {
                        result.closeModal();
                        showEditProfileModal();
                    });

                    result.overlay.querySelector('#changeCoverBtn')?.addEventListener('click', function() {
                        document.getElementById('coverInput')?.click();
                        result.closeModal();
                    });
                }
            }

            function showEditProfileModal() {
                const u = state.currentUser;
                if (!u) return;

                const content = `
                <div class="input-group"><label>👤 Имя</label><input type="text" id="editName" value="${escapeHTML(u.name)}" placeholder="Ваше имя"></div>
                <div class="input-group"><label>🆔 Username</label><input type="text" id="editUsername" value="${u.username || ''}" placeholder="username"></div>
                <div class="input-group"><label>💬 Статус</label><input type="text" id="editStatus" value="${escapeHTML(u.status || '')}" placeholder="Ваш статус"></div>
                <div class="input-group"><label>📝 О себе</label><textarea id="editBio" rows="3" placeholder="Расскажите о себе">${escapeHTML(u.bio || '')}</textarea></div>
                <button class="btn btn-primary" id="saveProfileBtn">💾 Сохранить изменения</button>`;

                const result = showModal('✏️ Редактирование профиля', content);

                result.overlay.querySelector('#saveProfileBtn').addEventListener('click', function() {
                    const newName = result.overlay.querySelector('#editName').value.trim();
                    const newUsername = result.overlay.querySelector('#editUsername').value.trim();
                    const newStatus = result.overlay.querySelector('#editStatus').value.trim();
                    const newBio = result.overlay.querySelector('#editBio').value.trim();

                    if (!newName) return showToast('Имя не может быть пустым', 'error');

                    state.currentUser.name = newName;
                    state.currentUser.username = newUsername || state.currentUser.username;
                    state.currentUser.status = newStatus;
                    state.currentUser.bio = newBio;

                    if (state.users[state.currentUser.id]) {
                        state.users[state.currentUser.id].name = newName;
                        state.users[state.currentUser.id].username = newUsername || state.users[state.currentUser.id].username;
                        state.users[state.currentUser.id].status = newStatus;
                        state.users[state.currentUser.id].bio = newBio;
                    }

                    saveState();
                    result.closeModal();
                    render();
                    showToast('Профиль обновлён!', 'success');
                });
            }

            function showCreateModal() {
                const contacts = Object.values(state.users).filter(function(u) { return u.id !== state.currentUser.id && !state.blacklist.includes(u.id); });

                const content = `
                <div class="input-group"><input type="text" id="contactSearchInput" placeholder="🔍 Поиск контактов..." autocomplete="off"></div>
                <div style="max-height:250px;overflow-y:auto;" id="contactsList">
                    ${contacts.map(function(c) {
                        return '<div class="setting-row contact-item" data-id="' + c.id + '" style="cursor:pointer;"><span>' + c.avatar + ' ' + c.name + ' <span style="color:var(--purple);font-size:0.8rem;">@' + (c.username || 'нет') + '</span></span><span style="color:var(--text2);font-size:0.7rem;">' + (c.status || '') + '</span></div>';
                    }).join('')}
                </div>
                <button class="btn btn-outline btn-sm" style="margin-top:8px;width:100%;" id="createGroupBtn"><i class="fas fa-users"></i> Создать группу</button>`;

                const result = showModal('💬 Новый чат', content);

                result.overlay.querySelector('#contactSearchInput')?.addEventListener('input', function() {
                    const q = this.value.toLowerCase();
                    result.overlay.querySelectorAll('.contact-item').forEach(function(item) {
                        item.style.display = item.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
                    });
                });

                result.overlay.querySelectorAll('.contact-item').forEach(function(item) {
                    item.addEventListener('click', function() {
                        result.closeModal();
                        createChatWithUser(item.dataset.id);
                    });
                });

                result.overlay.querySelector('#createGroupBtn')?.addEventListener('click', function() {
                    result.closeModal();
                    showCreateGroupModal();
                });
            }

            function showCreateGroupModal() {
                const contacts = Object.values(state.users).filter(function(u) { return u.id !== state.currentUser.id && !state.blacklist.includes(u.id); });
                const selected = new Set();

                const content = `
                <div class="input-group"><label>Название группы</label><input type="text" id="groupNameInput" placeholder="Название группы"></div>
                <div style="max-height:200px;overflow-y:auto;" id="groupContactsList">
                    ${contacts.map(function(c) {
                        return '<div class="setting-row group-contact-item" data-id="' + c.id + '" style="cursor:pointer;"><span>' + c.avatar + ' ' + c.name + '</span><i class="fas fa-circle" style="color:var(--border);font-size:0.4rem;transition:all 0.2s;"></i></div>';
                    }).join('')}
                </div>
                <button class="btn btn-primary" id="confirmCreateGroupBtn" disabled>Создать группу</button>`;

                const result = showModal('👥 Новая группа', content);

                const updateCreateBtn = function() {
                    const btn = result.overlay.querySelector('#confirmCreateGroupBtn');
                    if (btn) btn.disabled = selected.size === 0;
                };

                result.overlay.querySelectorAll('.group-contact-item').forEach(function(item) {
                    item.addEventListener('click', function() {
                        const id = item.dataset.id;
                        const icon = item.querySelector('i');
                        if (selected.has(id)) {
                            selected.delete(id);
                            item.style.background = '';
                            icon.style.color = 'var(--border)';
                        } else {
                            selected.add(id);
                            item.style.background = 'var(--bg2)';
                            icon.style.color = 'var(--purple)';
                        }
                        updateCreateBtn();
                    });
                });

                result.overlay.querySelector('#confirmCreateGroupBtn').addEventListener('click', function() {
                    if (selected.size === 0) return;
                    const name = result.overlay.querySelector('#groupNameInput').value.trim() || 'Новая группа';
                    const newChat = {
                        id: 'c_' + generateId(),
                        type: 'group',
                        name: name,
                        avatar: '👥',
                        description: '',
                        participants: [state.currentUser.id, ...Array.from(selected)],
                        admin: state.currentUser.id,
                        unread: {},
                        pinned: false,
                        mute: false
                    };
                    state.chats.push(newChat);
                    state.messages[newChat.id] = [{
                        id: generateId(),
                        sender: state.currentUser.id,
                        text: '🎉 Группа "' + name + '" создана!',
                        time: Date.now(),
                        type: 'text',
                        deleted: false
                    }];
                    saveState();
                    result.closeModal();
                    renderChatList();
                    openChat(newChat.id);
                    showToast('Группа "' + name + '" создана!', 'success');
                });
            }

            function createChatWithUser(profileId) {
                const existing = state.chats.find(function(c) { return c.type === 'private' && c.participants.includes(state.currentUser.id) && c.participants.includes(profileId); });
                if (existing) {
                    openChat(existing.id);
                    return;
                }
                const newChat = {
                    id: 'c_' + generateId(),
                    type: 'private',
                    participants: [state.currentUser.id, profileId],
                    unread: {},
                    pinned: false,
                    mute: false
                };
                state.chats.push(newChat);
                state.messages[newChat.id] = [];
                saveState();
                renderChatList();
                openChat(newChat.id);
            }

            // ==================== ГЛОБАЛЬНЫЕ ОБРАБОТЧИКИ ====================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeAllModals();
                    removeContextMenu();
                    const p = document.getElementById('emojiPanel');
                    if (p) p.style.display = 'none';
                }
            });

            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('modal-overlay')) {
                    e.target.classList.add('closing');
                    setTimeout(function() { if (e.target.parentNode) e.target.remove(); }, 200);
                }
                if (e.target.classList.contains('context-menu-overlay')) {
                    e.target.style.animation = 'fadeOut 0.15s ease forwards';
                    setTimeout(function() { if (e.target.parentNode) e.target.remove(); }, 150);
                }
            });

            let touchStartX = 0;
            let touchStartY = 0;
            document.addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            document.addEventListener('touchend', function(e) {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const diffX = touchEndX - touchStartX;
                const diffY = Math.abs(touchEndY - touchStartY);
                if (diffX > 80 && diffX > diffY && !state.showChatList && state.currentChat) {
                    state.showChatList = true;
                    state.currentChat = null;
                    state.activeTab = 'chats';
                    const cl = document.getElementById('chatListScreen');
                    const cs = document.getElementById('chatScreen');
                    const bn = document.getElementById('bottomNav');
                    if (cl) cl.classList.remove('hidden');
                    if (cs) cs.style.display = 'none';
                    if (bn) bn.style.display = 'flex';
                    renderChatList();
                    updateBottomNav();
                }
            });

            // ==================== ЗАПУСК ====================
            init();

            window.addEventListener('beforeunload', function() {
                if (state.currentCall) endCall();
                if (state.pendingAutoReply) clearTimeout(state.pendingAutoReply);
                if (state.currentUser) {
                    state.currentUser.online = false;
                    state.currentUser.lastSeen = Date.now();
                    saveState();
                }
            });

            window.showUserProfile = showUserProfile;
            window.startCall = startCall;
            window.endCall = endCall;
            window.addReaction = addReaction;

            console.log('✅ KChat Pro v8 загружен!');
            console.log('🖱️ Контекстное меню по долгому нажатию (500ms)');
            console.log('💬 Меню для сообщений: Копировать, Ответить, Реакции, Удалить');
            console.log('📋 Меню для чатов: Закрепить, Уведомления, Инфо, Очистить, Удалить');
            console.log('🎨 Панель выбора реакций с 10 эмодзи');
        })();
    </script>
</body>
</html>
